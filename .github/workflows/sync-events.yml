name: Sync Eventbrite events

# Pulls live/upcoming events from the Project H.O.O.D. Eventbrite org and
# regenerates the event cards on events.html. Commits go straight to `main`
# (at Brian's request, staging is skipped for this automated content-only
# sync) — GitHub Pages serves from main, so this keeps live events current
# automatically. This bot only ever touches the cards block between the
# EVENTBRITE:CARDS markers in events.html; it does not touch nav, footer,
# donation links, or any other page.

on:
  schedule:
    - cron: "0 13 * * *"   # daily at 8:00 AM Central (13:00 UTC)
  workflow_dispatch: {}     # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Eventbrite sync
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
        run: python3 scripts/sync_eventbrite.py

      - name: Commit and push if changed
        run: |
          git config user.name "ph-events-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- events.html; then
            echo "No changes to events.html — nothing to commit."
          else
            git add events.html
            git commit -m "chore: sync events from Eventbrite [automated]"
            git push origin main
          fi
